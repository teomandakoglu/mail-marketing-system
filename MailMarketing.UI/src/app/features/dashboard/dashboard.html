<section class="dashboard-page">
  <header class="welcome-panel">
    <div>
      <p class="eyebrow">Ana Sayfa</p>
      <h2>Hoş Geldiniz, {{ currentUser() }}</h2>
    </div>
  </header>

  <p class="error-message" *ngIf="errorMessage()">{{ errorMessage() }}</p>

  <section class="stats-grid" aria-label="Dashboard istatistikleri">
    <article class="stat-card">
      <span class="stat-label">Kayıtlı Abone Sayısı</span>
      <strong>{{ totalSubscribers() }}</strong>
    </article>

    <article class="stat-card">
      <span class="stat-label">Kayıtlı Şablon Sayısı</span>
      <strong>{{ totalTemplates() }}</strong>
    </article>

    <article class="stat-card">
      <span class="stat-label">Toplam Mail Gönderimi</span>
      <strong>{{ totalSentMails() }}</strong>
    </article>
  </section>

  <section class="quick-links" aria-label="Panel bağlantıları">
    <a routerLink="/panel/profile">Profil</a>
    <a routerLink="/panel/subscribers">Aboneler</a>
    <a routerLink="/panel/templates">Şablonlar</a>
    <a routerLink="/panel/campaigns">Gönderim</a>
    <a routerLink="/panel/reports">Raporlama</a>
    <a routerLink="/panel/email-config">Tanım</a>
    <a routerLink="/panel/users">Kullanıcılar</a>
  </section>
</section>
