<section class="auth-page">
  <div class="auth-form">
    <h1>Parola Hatırlatma</h1>

    <form [formGroup]="emailForm" (ngSubmit)="verifyEmail()" novalidate>
      <label>
        Mail Adresi
        <input type="email" formControlName="email" autocomplete="email" />
      </label>
      <p class="error" *ngIf="hasEmailError()">Geçerli bir mail adresi giriniz.</p>

      <button type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() && step() === 1 ? 'Doğrulanıyor...' : 'Doğrula' }}
      </button>
    </form>

    <form *ngIf="step() === 2" [formGroup]="passwordForm" (ngSubmit)="resetPassword()" novalidate>
      <label>
        Parola
        <input type="password" formControlName="password" autocomplete="new-password" />
      </label>
      <p class="error" *ngIf="hasPasswordError()">Parola en az 8 karakter, büyük harf, küçük harf ve rakam içermelidir.</p>

      <label>
        Parola Tekrar
        <input type="password" formControlName="confirmPassword" autocomplete="new-password" />
      </label>
      <p class="error" *ngIf="hasConfirmPasswordError()">Parolalar eşleşmelidir.</p>

      <button type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() && step() === 2 ? 'Güncelleniyor...' : 'Parolayı Güncelle' }}
      </button>
    </form>

    <p class="success" *ngIf="successMessage()">{{ successMessage() }}</p>
    <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>

    <a routerLink="/auth/login">Girişe dön</a>
  </div>
</section>
